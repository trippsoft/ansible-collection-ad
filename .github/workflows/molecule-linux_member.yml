---
name: Molecule - linux_member role
'on':
  workflow_call: {}
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/linux_member/**
      - '!roles/linux_member/.aar_doc.yml'
      - '!roles/linux_member/README.md'
      - '!roles/linux_member/meta/argument_specs.yml'
      - '!roles/linux_member/meta/main.yml'
  push:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/linux_member/**
      - '!roles/linux_member/.aar_doc.yml'
      - '!roles/linux_member/README.md'
      - '!roles/linux_member/meta/argument_specs.yml'
      - '!roles/linux_member/meta/main.yml'
defaults:
  run:
    working-directory: 'trippsc2.ad'
jobs:
  molecule:
    name: Run Molecule tests - linux_member
    runs-on:
      - self-hosted
      - linux
      - ansible
      - x64
    strategy:
      fail-fast: false
      matrix:
        box:
          - debian13_base
          - fedora44_base
          - fedora43_base
          - rocky10_base
          - rocky9_cis
          - rocky8_cis
          - ubuntu2604_base
          - ubuntu2404_base
          - ubuntu2204_base
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: trippsc2.ad
      - name: Run Molecule tests
        working-directory: 'trippsc2.ad'
        run: |
          source ~/venv/ansible-2.16/bin/activate
          rm -rf ~/.ansible/collections/ansible_collections/*
          cd ./roles/linux_member
          molecule test
          rm -rf ~/.ansible/collections/ansible_collections/*
          deactivate
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'
          MOLECULE_BOX: ${{ matrix.box }}
