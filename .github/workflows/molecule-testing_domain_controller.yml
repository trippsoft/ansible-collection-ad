---
name: Molecule - testing_domain_controller role
'on':
  workflow_call: {}
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/testing_domain_controller/**
      - '!roles/testing_domain_controller/.aar_doc.yml'
      - '!roles/testing_domain_controller/README.md'
      - '!roles/testing_domain_controller/meta/argument_specs.yml'
      - '!roles/testing_domain_controller/meta/main.yml'
  push:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/testing_domain_controller/**
      - '!roles/testing_domain_controller/.aar_doc.yml'
      - '!roles/testing_domain_controller/README.md'
      - '!roles/testing_domain_controller/meta/argument_specs.yml'
      - '!roles/testing_domain_controller/meta/main.yml'
defaults:
  run:
    working-directory: 'trippsc2.ad'
jobs:
  molecule:
    name: Run Molecule tests - testing_domain_controller
    runs-on:
      - self-hosted
      - linux
      - ansible
      - x64
    strategy:
      fail-fast: false
      matrix:
        box:
          - w2025_cis
          - w2022_cis
          - w2019_cis
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: trippsc2.ad
      - name: Run Molecule tests
        working-directory: 'trippsc2.ad'
        run: |
          source ~/venv/ansible-2.16/bin/activate
          rm -rf ~/.ansible/collections/ansible_collections/*
          cd ./roles/testing_domain_controller
          molecule test
          rm -rf ~/.ansible/collections/ansible_collections/*
          deactivate
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'
          MOLECULE_BOX: ${{ matrix.box }}
