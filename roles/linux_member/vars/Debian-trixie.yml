---
_domjoin_is_os_supported: true
_domjoin_is_tested: true

_domjoin_packages:
  - adcli
  - libnss-sss
  - libpam-sss
  - oddjob
  - oddjob-mkhomedir
  - packagekit
  - python3-pexpect
  - realmd
  - samba-common-bin
  - sssd
  - sssd-tools

_domjoin_ssh_service: sshd.service

_domjoin_sssd_conf_owner: root
_domjoin_sssd_conf_group: root
_domjoin_sssd_conf_mode: '0640'
